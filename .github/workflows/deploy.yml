name: Deploy Astro site with Typst to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Download Japanese Font
        run: |
          mkdir -p pdf/fonts
          curl -L -o pdf/fonts/NotoSansCJKjp-Regular.otf "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf"
          curl -L -o pdf/fonts/NotoSansCJKjp-Bold.otf "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansCJKjp-Bold.otf"

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Build Web and PDF
        run: ./build.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger VPS Deploy Webhook
        run: |
          curl -X POST https://tunagemon.totototo0526.xyz/api/webhook \
            -H "Content-Type: application/json" \
            -d '{"secret":"tunagemon_deploy_secret_2026"}'
