<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>つなげモン モバイル システム概要 | ユースケース</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css?v=1.1">
</head>

<body class="font-sans text-slate-800 bg-white flex flex-col min-h-screen">

    <!-- ナビゲーション -->
    <nav class="fixed w-full bg-white/90 backdrop-blur-sm z-50 border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="network" class="w-8 h-8 text-orange-500"></i>
                <a href="LP.html" class="text-2xl font-black tracking-tight text-slate-800 hover:opacity-80 transition">つなげモン<span class="text-sm font-bold text-slate-500 ml-2">シリーズ</span></a>
            </div>
            <div class="hidden md:flex gap-6 items-center font-bold text-sm text-slate-600">
                <a href="LP.html" class="hover:text-orange-500 transition">ホームへ戻る</a>
                <a href="https://www.k-sp.co.jp/contact" class="bg-orange-500 text-white px-5 py-2 rounded-full hover:bg-orange-600 transition shadow-md">資料請求・お問い合わせ</a>
            </div>
        </div>
    </nav>

    <!-- ヘッダー -->
    <header class="pt-32 pb-12 text-center z-10 bg-slate-50">
        <h1 class="text-4xl md:text-5xl font-extrabold text-navy tracking-wider mb-4">つなげモン モバイル システム概要</h1>
        <h2 class="text-lg md:text-xl font-bold text-gray-600">軽貨物管理システムのご提案</h2>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow flex items-center justify-center px-6 py-12 z-10 bg-grid-pattern relative">
        <section class="bg-white w-full max-w-6xl mx-auto rounded-3xl shadow-2xl flex flex-col md:flex-row items-center justify-between space-y-12 md:space-y-0 p-8 md:p-16 relative z-10">
            <!-- Left Column: Input Data -->
            <div class="flex flex-col items-center space-y-8" data-purpose="input-section">
                <h3 class="text-xl font-bold mb-4 text-slate-800 border-b-2 border-orange-500 pb-2">データ連携・入力</h3>
                <div class="flex flex-col items-center text-center">
                    <div class="w-24 h-20 mb-2 flex items-center justify-center">
                        <svg class="w-full h-full text-navy" fill="currentColor" viewBox="0 0 24 24"><path d="M18.9 10.1C18.4 6.7 15.5 4 12 4 9.1 4 6.6 5.8 5.4 8.3 2.3 8.7 0 11.3 0 14.5 0 17.5 2.5 20 5.5 20h13c2.5 0 4.5-2 4.5-4.5 0-2.4-1.8-4.4-4.1-5.4z"></path></svg>
                    </div>
                    <p class="text-sm font-bold text-slate-700">他システムとの連携<br/>(API/CSV)</p>
                </div>
                <div class="flex flex-col items-center text-center">
                    <div class="w-16 h-20 mb-2 relative flex flex-col items-center justify-center">
                        <svg class="w-full h-full text-navy" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        <div class="absolute bottom-3 left-1/2 transform -translate-x-1/2 w-10 flex justify-between">
                            <div class="w-0.5 h-4 bg-navy"></div><div class="w-1 h-4 bg-navy"></div><div class="w-0.5 h-4 bg-navy"></div><div class="w-1 h-4 bg-navy"></div><div class="w-0.5 h-4 bg-navy"></div>
                        </div>
                    </div>
                    <p class="text-sm font-bold text-slate-700">出荷登録</p>
                </div>
            </div>

            <!-- Connecting Arrows 1 -->
            <div class="hidden md:flex flex-col justify-center space-y-16 -mx-4">
                <svg class="w-16 h-12 text-blue-500 animate-flow" fill="currentColor" viewBox="0 0 24 24"><path d="M4 10h10V5l8 7-8 7v-5H4v-4z"></path></svg>
                <svg class="w-16 h-12 text-blue-500 animate-flow" fill="currentColor" viewBox="0 0 24 24"><path d="M4 10h10V5l8 7-8 7v-5H4v-4z"></path></svg>
            </div>
            <!-- Mobile Flow Arrow -->
            <div class="md:hidden flex justify-center w-full py-4">
                <svg class="w-12 h-16 text-blue-500 rotate-90" fill="currentColor" viewBox="0 0 24 24"><path d="M4 10h10V5l8 7-8 7v-5H4v-4z"></path></svg>
            </div>

            <!-- Middle Column: Database -->
            <div class="flex flex-col items-center" data-purpose="database-section">
                <div class="flex items-center space-x-2 mb-4">
                    <svg class="w-20 h-24 text-navy tsunagemon-core" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M4 3h10v18H4V3zm2 2v2h6V5H6zm0 4v2h6V9H6zm0 4v2h6v-2H6zm0 4v2h6v-2H6z"></path>
                    </svg>
                    <svg class="w-20 h-24 text-navy -ml-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 11c-3.87 0-7-1.34-7-3s3.13-3 7-3 7 1.34 7 3-3.13 3-7 3zm0 2c-3.87 0-7 1.34-7 3s3.13 3 7 3 7-1.34 7-3-3.13-3-7-3zm0 5c-3.87 0-7 1.34-7 3s3.13 3 7 3 7-1.34 7-3-3.13-3-7-3z"></path>
                    </svg>
                </div>
                <p class="text-xl font-bold text-slate-800">出荷データベース</p>
                <div class="mt-4 bg-orange-100 text-orange-700 px-4 py-1 rounded-full text-xs font-bold border border-orange-200">
                    基幹システムと連動
                </div>
            </div>

            <!-- Connecting Arrow 2 -->
            <div class="hidden md:flex items-center">
                <svg class="w-20 h-20 text-blue-500 animate-flow" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M4 10h10V5l8 7-8 7v-5H4v-4z"></path>
                </svg>
            </div>
            <!-- Mobile Flow Arrow -->
            <div class="md:hidden flex justify-center w-full py-4">
                <svg class="w-12 h-16 text-blue-500 rotate-90" fill="currentColor" viewBox="0 0 24 24"><path d="M4 10h10V5l8 7-8 7v-5H4v-4z"></path></svg>
            </div>

            <!-- Right Column: Mobile Status -->
            <div class="flex flex-col items-center" data-purpose="mobile-status-section">
                <h3 class="text-xl font-bold mb-6 text-slate-800 border-b-2 border-orange-500 pb-2">モバイル配送ステータス</h3>
                <div class="flex flex-col sm:flex-row gap-6">
                    <!-- Green: Delivered -->
                    <div class="phone-frame floating-card">
                        <div class="phone-notch"></div>
                        <div class="status-green h-full w-full flex flex-col p-3 pt-6">
                            <div class="bg-white/20 rounded-full w-10 h-10 self-center flex items-center justify-center mb-1">
                                <span class="text-white font-bold text-2xl">✓</span>
                            </div>
                            <h4 class="text-white text-center font-bold text-lg mb-4">納品済</h4>
                            <div class="bg-white rounded-sm p-3 text-xs space-y-2 mt-auto mb-2 text-center shadow-sm">
                                <p class="font-bold border-b pb-1 text-center text-slate-800">伝票No xxx</p>
                                <div class="text-center text-slate-600"><span>1 A商品</span></div>
                                <div class="text-center text-slate-600"><span>2 B商品</span></div>
                                <div class="h-6"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Blue: Shipping -->
                    <div class="phone-frame floating-card">
                        <div class="phone-notch"></div>
                        <div class="status-blue h-full w-full flex flex-col p-3 pt-6">
                            <div class="bg-white/20 rounded-full w-10 h-10 self-center flex items-center justify-center mb-1 text-white">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm12 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm1-8.5l2.5 3.5h-5.5v-3.5h3z"></path></svg>
                            </div>
                            <h4 class="text-white text-center font-bold text-lg mb-4">出荷中</h4>
                            <div class="bg-white rounded-sm p-3 text-xs space-y-2 mt-auto mb-2 text-center shadow-sm">
                                <p class="font-bold border-b pb-1 text-center text-slate-800">伝票No xxx</p>
                                <div class="text-center text-slate-600"><span>1 A商品</span></div>
                                <div class="text-center text-slate-600"><span>2 B商品</span></div>
                                <div class="h-6"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Yellow: Preparing -->
                    <div class="phone-frame floating-card">
                        <div class="phone-notch"></div>
                        <div class="status-yellow h-full w-full flex flex-col p-3 pt-6">
                            <div class="bg-black/20 rounded-full w-10 h-10 self-center flex items-center justify-center mb-1">
                                <span class="text-black font-black text-2xl">!</span>
                            </div>
                            <h4 class="text-black text-center font-bold text-lg mb-4">準備中</h4>
                            <div class="bg-white rounded-sm p-3 text-xs space-y-2 mt-auto mb-2 text-center shadow-sm">
                                <p class="font-bold border-b pb-1 text-center text-slate-800">伝票No xxx</p>
                                <div class="text-center text-slate-600"><span>1 A商品</span></div>
                                <div class="text-center text-slate-600"><span>2 B商品</span></div>
                                <div class="h-6"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- フッター -->
    <footer class="bg-slate-900 text-slate-400 py-12 px-6 text-center text-sm border-t border-slate-800 mt-auto z-20 relative">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <i data-lucide="network" class="w-6 h-6 text-slate-500"></i>
                <span class="font-bold text-slate-300">つなげモンシリーズ</span>
            </div>
            <div class="flex gap-6">
                <a href="https://www.k-sp.co.jp/" class="hover:text-white transition" target="_blank" rel="noopener noreferrer">運営会社</a>
                <a href="https://www.k-sp.co.jp/other2" class="hover:text-white transition" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a>
            </div>
            <p>&copy; 2026 つなげモン All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>

</html>
