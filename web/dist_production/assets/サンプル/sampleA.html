<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>つなげもん モバイル システム概要</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-background">
    body {
      background-color: #f4f6f8;
      background-image: 
        linear-gradient(rgba(200,200,200,0.2) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(200,200,200,0.2) 1px, transparent 1px),
        linear-gradient(45deg, rgba(200,200,200,0.1) 1px, transparent 1px),
        linear-gradient(-45deg, rgba(200,200,200,0.1) 1px, transparent 1px);
      background-size: 60px 60px, 60px 60px, 80px 80px, 80px 80px;
    }
  </style>
<style data-purpose="layout-and-colors">
    .text-navy { color: #002a5c; }
    .bg-navy { background-color: #002a5c; }
    .status-green { background-color: #009944; }
    .status-blue { background-color: #0071c5; }
    .status-yellow { background-color: #ffb81c; }
    .phone-frame {
      width: 130px;
      height: 260px;
      border: 6px solid #1a1a1a;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      background-color: #1a1a1a;
    }
    .phone-notch {
      width: 50px;
      height: 12px;
      background: #1a1a1a;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      z-index: 10;
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
<!-- BEGIN: MainHeader -->
<header class="pt-10 pb-6 text-center z-10">
<h1 class="text-5xl font-extrabold text-navy tracking-wider mb-4">つなげもん モバイル システム概要</h1>
<h2 class="text-xl font-bold text-gray-800">軽貨物管理システムのご提案</h2>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="flex-grow flex items-center justify-center px-8 z-10">
<section class="bg-white w-full max-w-6xl rounded-2xl shadow-xl flex flex-col md:flex-row items-center justify-between space-y-12 md:space-y-0 p-16" data-purpose="diagram-container">
<!-- Left Column: Input Data -->
<div class="flex flex-col items-center space-y-8" data-purpose="input-section">
<h3 class="text-xl font-bold mb-4">データ連携・入力</h3>
<div class="flex flex-col items-center text-center">
<div class="w-24 h-20 mb-2 flex items-center justify-center">
<svg class="w-full h-full text-[#002a5c]" fill="currentColor" viewbox="0 0 24 24"><path d="M18.9 10.1C18.4 6.7 15.5 4 12 4 9.1 4 6.6 5.8 5.4 8.3 2.3 8.7 0 11.3 0 14.5 0 17.5 2.5 20 5.5 20h13c2.5 0 4.5-2 4.5-4.5 0-2.4-1.8-4.4-4.1-5.4z"></path></svg>
</div>
<p class="text-sm font-bold">他システムとの連携<br/>(API/CSV)</p>
</div>
<div class="flex flex-col items-center text-center">
<div class="w-16 h-20 mb-2 relative flex flex-col items-center justify-center">
<svg class="w-full h-full text-[#002a5c]" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"></path></svg>
<div class="absolute bottom-3 left-1/2 transform -translate-x-1/2 w-10 flex justify-between">
<div class="w-0.5 h-4 bg-[#002a5c]"></div><div class="w-1 h-4 bg-[#002a5c]"></div><div class="w-0.5 h-4 bg-[#002a5c]"></div><div class="w-1 h-4 bg-[#002a5c]"></div><div class="w-0.5 h-4 bg-[#002a5c]"></div>
</div>
</div>
<p class="text-sm font-bold">出荷登録</p>
</div>
</div>
<!-- Connecting Arrows 1 -->
<div class="flex flex-col justify-center space-y-16 -mx-4">
<svg class="w-16 h-12 text-[#0071c5]" fill="currentColor" viewbox="0 0 24 24"><path d="M4 10h10V5l8 7-8 7v-5H4v-4z"></path></svg>
<svg class="w-16 h-12 text-[#0071c5]" fill="currentColor" viewbox="0 0 24 24"><path d="M4 10h10V5l8 7-8 7v-5H4v-4z"></path></svg>
</div>
<!-- Middle Column: Database -->
<div class="flex flex-col items-center" data-purpose="database-section">
<div class="flex items-center space-x-2 mb-4">
<svg class="w-20 h-24 text-[#002a5c]" fill="currentColor" viewbox="0 0 24 24">
<!-- Server Rack -->
<path d="M4 3h10v18H4V3zm2 2v2h6V5H6zm0 4v2h6V9H6zm0 4v2h6v-2H6zm0 4v2h6v-2H6z"></path>
</svg>
<svg class="w-20 h-24 text-[#002a5c] -ml-4" fill="currentColor" viewbox="0 0 24 24">
<!-- Cylinders -->
<path d="M12 11c-3.87 0-7-1.34-7-3s3.13-3 7-3 7 1.34 7 3-3.13 3-7 3zm0 2c-3.87 0-7 1.34-7 3s3.13 3 7 3 7-1.34 7-3-3.13-3-7-3zm0 5c-3.87 0-7 1.34-7 3s3.13 3 7 3 7-1.34 7-3-3.13-3-7-3z"></path>
</svg>
</div>
<p class="text-xl font-bold">出荷データベース</p>
</div>
<!-- Connecting Arrow 2 -->
<div class="flex items-center">
<svg class="w-20 h-20 text-blue-500" fill="currentColor" viewBox="0 0 24 24" viewbox="0 0 20 20">
<path d="M4 10h10V5l8 7-8 7v-5H4v-4z"></path>
</svg>
</div>
<!-- Right Column: Mobile Status -->
<div class="flex flex-col items-center" data-purpose="mobile-status-section">
<h3 class="text-xl font-bold mb-6">モバイル配送ステータス</h3>
<div class="flex space-x-4">
<!-- Green: Delivered -->
<div class="phone-frame">
<div class="phone-notch"></div>
<div class="status-green h-full w-full flex flex-col p-3 pt-6">
<div class="bg-white/20 rounded-full w-10 h-10 self-center flex items-center justify-center mb-1">
<span class="text-white font-bold text-2xl">✓</span>
</div>
<h4 class="text-white text-center font-bold text-lg mb-4">納品済</h4>
<div class="bg-white rounded-sm p-3 text-xs space-y-2 mt-auto mb-2 text-center shadow-sm">
<p class="font-bold border-b pb-1 text-center">伝票No xxx</p>
<div class="text-center"><span>1 A商品</span></div>
<div class="text-center"><span>2 B商品</span></div>
<div class="h-6"></div>
</div>
</div>
</div>
<!-- Blue: Shipping -->
<div class="phone-frame">
<div class="phone-notch"></div>
<div class="status-blue h-full w-full flex flex-col p-3 pt-6">
<div class="bg-white/20 rounded-full w-10 h-10 self-center flex items-center justify-center mb-1 text-white">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm12 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm1-8.5l2.5 3.5h-5.5v-3.5h3z"></path></svg>
</div>
<h4 class="text-white text-center font-bold text-lg mb-4">出荷中</h4>
<div class="bg-white rounded-sm p-3 text-xs space-y-2 mt-auto mb-2 text-center shadow-sm">
<p class="font-bold border-b pb-1 text-center">伝票No xxx</p>
<div class="text-center"><span>1 A商品</span></div>
<div class="text-center"><span>2 B商品</span></div>
<div class="h-6"></div>
</div>
</div>
</div>
<!-- Yellow: Preparing -->
<div class="phone-frame">
<div class="phone-notch"></div>
<div class="status-yellow h-full w-full flex flex-col p-3 pt-6">
<div class="bg-black/20 rounded-full w-10 h-10 self-center flex items-center justify-center mb-1">
<span class="text-black font-black text-2xl">!</span>
</div>
<h4 class="text-black text-center font-bold text-lg mb-4">準備中</h4>
<div class="bg-white rounded-sm p-3 text-xs space-y-2 mt-auto mb-2 text-center shadow-sm">
<p class="font-bold border-b pb-1 text-center">伝票No xxx</p>
<div class="text-center"><span>1 A商品</span></div>
<div class="text-center"><span>2 B商品</span></div>
<div class="h-6"></div>
</div>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- END: MainContent -->
<!-- BEGIN: MainFooter -->
<footer class="p-6 flex justify-between items-center z-10">
<div class="flex items-center space-x-2" data-purpose="footer-logo">
<div class="flex items-center justify-center w-8 h-8">
<svg fill="none" viewbox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<path d="M16 2L2 16L16 30L30 16L16 2Z" fill="#0071c5"></path>
<path d="M16 8L8 16L16 24L24 16L16 8Z" fill="#009944"></path>
</svg>
</div>
<span class="text-xl font-bold text-navy">つなげもん</span>
</div>
<div class="text-xs text-gray-600" data-purpose="copyright">
      © Copyright Tsunagemon All rights reserved.
    </div>
</footer>
<!-- END: MainFooter -->
</body></html>
