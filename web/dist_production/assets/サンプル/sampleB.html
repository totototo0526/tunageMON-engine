<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Manufacturing Overview Diagram</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&amp;display=swap" rel="stylesheet" />
    <style data-purpose="custom-typography">
        body {
            font-family: 'Noto+Sans+JP', sans-serif;
        }
    </style>
    <style data-purpose="custom-shapes">
        /* Cloud shape using pseudo-elements */
        .cloud-container {
            position: relative;
            width: 220px;
            height: 120px;
            background: #2563eb;
            border-radius: 50% 50% 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cloud-container::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background: #2563eb;
            border-radius: 50%;
            top: 10%;
            left: -20%;
        }

        .cloud-container::after {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: #2563eb;
            border-radius: 50%;
            top: -10%;
            right: -20%;
        }

        /* Arrow shapes for flow */
        .flow-arrow {
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 15px solid #2563eb;
        }

        .process-arrow {
            width: 40px;
            height: 12px;
            background: #2563eb;
            position: relative;
            margin: 0 10px;
        }

        .process-arrow::after {
            content: '';
            position: absolute;
            right: -10px;
            top: -4px;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 12px solid #2563eb;
        }

        /* Dashed arrow for jump */
        .dashed-arrow-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dash {
            width: 8px;
            height: 12px;
            background: #60a5fa;
        }

        .dash-head {
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 12px solid #2563eb;
        }
    </style>
</head>

<body class="bg-white p-8 flex justify-center items-start min-h-screen">
    <!-- BEGIN: MainContainer -->
    <main class="w-full max-w-6xl bg-white" data-purpose="diagram-canvas">
        <!-- BEGIN: HeaderSection -->
        <header class="mb-10">
            <div class="flex items-center mb-4">
                <div class="w-3 h-10 bg-blue-700 mr-4"></div>
                <h1 class="text-4xl font-bold text-slate-800">つなゲモンモビル 製造の概安</h1>
            </div>
            <p class="text-2xl font-bold text-slate-700 ml-6">プロセスフローの製造管理システムの基準提案</p>
        </header>
        <!-- END: HeaderSection -->
        <!-- BEGIN: TopFlowchart -->
        <section class="flex items-center justify-start gap-12 mb-20 ml-6" data-purpose="top-flow">
            <!-- Manufacturing Plan Box -->
            <div
                class="w-48 h-24 bg-blue-600 rounded-xl shadow-lg flex items-center justify-center text-white text-xl font-bold">
                製造計画
            </div>
            <!-- Arrow -->
            <div class="flex items-center">
                <div class="w-12 h-4 bg-blue-400"></div>
                <div class="flow-arrow border-l-blue-400"></div>
            </div>
            <!-- Order Registration Box -->
            <div
                class="w-56 h-24 bg-blue-500 rounded-xl shadow-lg flex flex-col items-center justify-center text-white p-4">
                <span class="text-xl font-bold">受注登録</span>
                <span class="text-xs mt-1">他システムとの連携あり<br />(API、CSV)</span>
            </div>
            <!-- Arrow Downwards diagonal -->
            <div class="flex items-center transform rotate-12">
                <div class="w-12 h-4 bg-blue-400"></div>
                <div class="flow-arrow border-l-blue-400"></div>
            </div>
            <!-- Cloud Database -->
            <div class="cloud-container shadow-sm z-0">
                <span class="text-white text-xl font-bold relative z-10">受注データベース</span>
            </div>
        </section>
        <!-- END: TopFlowchart -->
        <!-- BEGIN: ProcessStepsContainer -->
        <section class="bg-blue-50/50 rounded-3xl p-8 mb-12 border border-blue-100 relative"
            data-purpose="process-steps">
            <!-- Triangle pointer on top -->
            <div
                class="absolute -top-[30px] right-[20%] w-0 h-0 border-l-[30px] border-l-transparent border-r-[30px] border-r-transparent border-b-[30px] border-b-blue-500">
            </div>
            <div class="flex items-center justify-between">
                <!-- Step 1 -->
                <div class="flex flex-col items-center flex-1">
                    <div
                        class="bg-white border-2 border-slate-300 rounded-md w-full py-4 text-center text-2xl font-bold mb-3 shadow-sm">
                        工程1
                    </div>
                    <div class="w-full bg-slate-200 h-4 rounded-full overflow-hidden">
                        <div class="bg-blue-500 h-full w-[60%]"></div>
                    </div>
                </div>
                <!-- Arrow -->
                <div class="process-arrow"></div>
                <!-- Step 2 -->
                <div class="flex flex-col items-center flex-1">
                    <div
                        class="bg-white border-2 border-slate-300 rounded-md w-full py-4 text-center text-2xl font-bold mb-3 shadow-sm">
                        工程2
                    </div>
                    <div class="w-full bg-slate-200 h-4 rounded-full overflow-hidden">
                        <div class="bg-blue-500 h-full w-[45%]"></div>
                    </div>
                </div>
                <!-- Arrow -->
                <div class="process-arrow"></div>
                <!-- Step 3 -->
                <div class="flex flex-col items-center flex-1">
                    <div
                        class="bg-white border-2 border-slate-300 rounded-md w-full py-4 text-center text-2xl font-bold mb-3 shadow-sm">
                        工程3
                    </div>
                    <div class="w-full bg-slate-200 h-4 rounded-full overflow-hidden">
                        <div class="bg-blue-500 h-full w-[30%]"></div>
                    </div>
                </div>
                <!-- Jump Arrow -->
                <div class="flex items-center gap-2 mx-4">
                    <div class="w-3 h-3 bg-blue-400 opacity-60"></div>
                    <div class="w-3 h-3 bg-blue-400 opacity-80"></div>
                    <div class="w-3 h-3 bg-blue-500"></div>
                    <div
                        class="w-0 h-0 border-t-[8px] border-t-transparent border-b-[8px] border-b-transparent border-l-[12px] border-l-blue-600">
                    </div>
                </div>
                <!-- Step n -->
                <div class="flex flex-col items-center flex-1">
                    <div
                        class="bg-white border-2 border-slate-300 rounded-md w-full py-4 text-center text-2xl font-bold mb-3 shadow-sm">
                        工程n
                    </div>
                    <div class="w-full bg-slate-200 h-4 rounded-full overflow-hidden">
                        <div class="bg-blue-500 h-full w-[80%]"></div>
                    </div>
                </div>
            </div>
        </section>
        <!-- END: ProcessStepsContainer -->
        <!-- BEGIN: DevicesSection -->
        <section class="flex flex-col items-center" data-purpose="mobile-integration">
            <h2 class="text-4xl font-bold text-blue-900 mb-12">タブレット・スマートフォンから</h2>
            <div class="flex items-end gap-12">
                <!-- Tablet Mockup -->
                <div
                    class="bg-black p-4 rounded-[40px] shadow-2xl relative w-[420px] h-[300px] border-4 border-slate-700">
                    <div class="bg-white w-full h-full rounded-[25px] p-6 flex flex-col items-center justify-between">
                        <div class="text-center">
                            <p class="text-xl font-bold mb-1">製造ロット xxx</p>
                            <p class="text-lg mb-6">工程2</p>
                        </div>
                        <button
                            class="w-full bg-[#00b050] text-white text-3xl font-bold py-4 rounded-lg shadow-md mb-4">
                            【完 了】
                        </button>
                        <button class="w-1/2 border-2 border-blue-600 text-blue-800 py-2 rounded-md font-bold">
                            進捗登録
                        </button>
                    </div>
                    <!-- Home button circle -->
                    <div class="absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full border border-slate-500">
                    </div>
                </div>
                <!-- Smartphone Mockup -->
                <div
                    class="bg-black p-3 rounded-[35px] shadow-2xl relative w-[180px] h-[350px] border-4 border-slate-700">
                    <div
                        class="bg-white w-full h-full rounded-[25px] p-4 flex flex-col items-center justify-between pt-8">
                        <div class="text-center">
                            <p class="text-xs font-bold">製造ロット xxx</p>
                            <p class="text-xs mb-4">工程2</p>
                        </div>
                        <button
                            class="w-full bg-[#00b050] text-white text-3xl font-bold py-4 rounded-lg shadow-md mb-4">
                            【完 了】
                        </button>
                        <button class="w-1/2 border-2 border-blue-600 text-blue-800 py-2 rounded-md font-bold">
                            進捗登録
                        </button>
                    </div>
                    <!-- Top speaker grill -->
                    <div class="absolute top-6 left-1/2 -translate-x-1/2 w-10 h-1 bg-slate-800 rounded-full"></div>
                </div>
                <!-- Right Text Info -->
                <div class="mb-12 self-center ml-4">
                    <p class="text-3xl font-bold text-slate-800 leading-snug">
                        タッチのみで<br />
                        進捗登録が可能
                    </p>
                </div>
            </div>
        </section>
        <!-- END: DevicesSection -->
    </main>
    <!-- END: MainContainer -->
</body>

</html>
